<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@700&display=swap" rel="stylesheet" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Promo Ad Preview Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f6f3;
    --bg-tertiary: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --border-light: rgba(0,0,0,0.08);
    --border-medium: rgba(0,0,0,0.15);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-pill: 80px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-primary);
    border-bottom: 0.5px solid var(--border-light);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  header p {
    font-size: 12px;
    color: var(--text-secondary);
    margin-left: auto;
  }

  .app {
    display: flex;
    flex: 1;
    gap: 0;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--bg-primary);
    border-right: 0.5px solid var(--border-light);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    height: calc(100vh - 49px);
  }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 0.5px solid var(--border-light);
  }
  .sidebar-header h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .fields {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-group label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .field-group input[type="text"] {
    font-size: 13px;
    padding: 8px 10px;
    border: 0.5px solid var(--border-medium);
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .field-group input[type="text"]:focus {
    border-color: #000;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
  }

  .upload-zone {
    border: 1.5px dashed var(--border-medium);
    border-radius: var(--radius-md);
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    background: var(--bg-secondary);
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    min-height: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .upload-zone:hover { border-color: #000; background: var(--bg-primary); }
  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-zone .upload-label { font-size: 11px; color: var(--text-secondary); pointer-events: none; }
  .upload-zone .upload-icon { font-size: 16px; pointer-events: none; }
  .upload-zone .upload-preview { max-height: 44px; max-width: 100%; object-fit: contain; display: none; border-radius: 4px; }
  .upload-zone .upload-name { font-size: 10px; color: var(--text-secondary); display: none; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 0 2px;
    border-bottom: 0.5px solid var(--border-light);
    margin-bottom: 2px;
  }

  .divider { height: 0.5px; background: var(--border-light); margin: 2px 0; }

  .sidebar-footer {
    padding: 14px 16px;
    border-top: 0.5px solid var(--border-light);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn-generate {
    width: 100%;
    padding: 11px;
    background: #000;
    color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .btn-generate:hover { opacity: 0.82; }
  .btn-generate:active { transform: scale(0.98); }

  .btn-download:hover { background: var(--bg-secondary); }

  /* PREVIEW PANE */
  .preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 14px;
    background: var(--bg-secondary);
    overflow-y: auto;
    overflow-x: auto;
  }

  .preview-meta {
    width: 1200px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .preview-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  .preview-size {
    font-size: 11px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }

  .preview-canvas-wrap {
    width: 1200px;
    min-width: 1200px;
    height: 408px;
    overflow: hidden;
    border: none;
    background: #ffffff;
    box-shadow: none;
    flex-shrink: 0;
  }

  #livePreview {
    width: 1200px;
    height: 408px;
    display: block;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
  }

  /* PROMO AD LAYOUT — fixed 1200×408px */
  .promo-flex {
    display: flex;
    flex-direction: row-reverse;
    background: #ffffff;
    width: 1200px;
    height: 408px;
  }

  /* Story image: exactly 720×405px */
  .promo-picture {
    width: 720px;
    min-width: 720px;
    height: 408px;
    overflow: hidden;
    position: relative;
  }
  .promo-picture img {
    width: 720px;
    height: 408px;
    object-fit: cover;
    display: block;
  }
  .promo-picture .no-img {
    width: 720px;
    height: 408px;
    background: #dedad2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #999;
    flex-direction: column;
    gap: 8px;
  }

  /* Copy column: remaining 480px */
  .promo-copy {
    width: 480px;
    min-width: 480px;
    height: 408px;
    padding: 32px 32px 32px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .promo-title {
    color: #7f7f7f;
    font-family: 'Lato-Bold', 'Lato', Arial, Helvetica, sans-serif;
    font-size: 15px;
    font-style: normal;
    letter-spacing: 1.7px;
    line-height: 22px;
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  /* Headline: fixed 448×88px, <p> element */
  p.promo-headline {
    color: #202224;
    font-family: 'Freight-DispLight', 'Times New Roman', Times, serif;
    font-size: 40px;
    font-style: normal;
    font-weight: 300;
    line-height: 44px;
    margin: 0 0 16px;
    width: 448px;
    height: 88px;
    overflow: hidden;
  }

  .promo-cta {
    display: inline-block;
    background: #000;
    color: #fff;
    border-radius: 80px;
    font-family: 'Lato-Bold', 'Lato', Arial, Helvetica, sans-serif;
    font-size: 15px;
    padding: 8px 34px 7px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    width: fit-content;
  }

  .promo-sponsor {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'ReithSerif', Helvetica, Arial, freesans, sans-serif;
    font-size: 12px;
    color: #545658;
    margin-top: 2px;
  }

  .promo-sponsor img {
    width: 99.984px;
    height: 48.484px;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 1200px;
    height: 408px;
    color: var(--text-secondary);
    font-size: 13px;
    text-align: center;
    background: #ffffff;
  }
  .empty-icon { font-size: 40px; opacity: 0.35; }


  .field-group input.field-error {
    border-color: #e53935;
    box-shadow: 0 0 0 2px rgba(229,57,53,0.15);
  }

  .field-group .error-msg {
    font-size: 10px;
    color: #e53935;
    margin-top: 2px;
    display: none;
  }

  .field-group .error-msg.visible {
    display: block;
  }

  .upload-zone.zone-error {
    border-color: #e53935;
    background: #fff5f5;
  }

  .upload-zone .zone-error-msg {
    font-size: 10px;
    color: #e53935;
    margin-top: 3px;
    display: none;
    pointer-events: none;
  }

  .upload-zone.zone-error .zone-error-msg {
    display: block;
  }

  canvas { display: none; }

</style>

<body>

<header>
  <h1>Promo Ad Preview Generator</h1>
  <p>BBC StoryWorks layout</p>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Ad Fields</h2>
    </div>

    <div class="fields">

      <div class="section-label">Images</div>

      <div class="field-group">
        <label>Story image</label>
        <div class="upload-zone" id="storyImgZone">
          <input type="file" accept="image/*" id="storyImgInput" />
          <div class="upload-icon" id="storyImgIcon">🖼</div>
          <img class="upload-preview" id="storyImgPreview" alt="Story" />
          <div class="upload-label" id="storyImgLabel">Click or drop photo</div>
          <div class="upload-name" id="storyImgName"></div>
          <div class="zone-error-msg">Story image is required</div>
        </div>
      </div>

      <div class="field-group">
        <label>Sponsor logo</label>
        <div class="upload-zone" id="sponsorLogoZone">
          <input type="file" accept="image/*" id="sponsorLogoInput" />
          <div class="upload-icon" id="sponsorLogoIcon">🏷</div>
          <img class="upload-preview" id="sponsorLogoPreview" alt="Logo" />
          <div class="upload-label" id="sponsorLogoLabel">Click or drop logo</div>
          <div class="upload-name" id="sponsorLogoName"></div>
          <div class="zone-error-msg">Sponsor logo is required</div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-label">Copy</div>

      <div class="field-group">
        <label>Story title</label>
        <input type="text" id="fTitle" placeholder="e.g. Industrial Business Solutions" value="" />
        <span class="error-msg"></span>
      </div>

      <div class="field-group">
        <label>Story headline</label>
        <input type="text" id="fHeadline" placeholder="e.g. How Company keeps resources flowing" value="" />
        <span class="error-msg"></span>
      </div>

      <div class="field-group">
        <label>CTA button text</label>
        <input type="text" id="fCta" placeholder="e.g. Learn More" value="" />
        <span class="error-msg"></span>
      </div>

      <div class="field-group">
        <label>Sponsor text</label>
        <input type="text" id="fSponsor" placeholder="e.g. Paid and presented by" value="" />
        <span class="error-msg"></span>
      </div>

    </div>

    <div class="sidebar-footer">
      <button class="btn-generate" onclick="generatePreview()">Generate preview</button>
    </div>
  </div>

  <div class="preview-pane">
    <div class="preview-meta">
      <span class="preview-label">Live preview</span>
      <span class="preview-size" id="previewSize"></span>
    </div>    <div class="preview-canvas-wrap" id="screenshotTarget">
      <div id="livePreview">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🖼</div>
          <div>Fill in the fields and click <strong>Generate preview</strong></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let storyImgData = null;
  let sponsorLogoData = null;
  let previewGenerated = false;

  function handleImageUpload(inputId, previewId, labelId, nameId, iconId, onLoad) {
    const input = document.getElementById(inputId);
    input.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const previewEl = document.getElementById(previewId);
        previewEl.src = e.target.result;
        previewEl.style.display = 'block';
        document.getElementById(labelId).style.display = 'none';
        document.getElementById(iconId).style.display = 'none';
        document.getElementById(nameId).style.display = 'block';
        const name = file.name;
        document.getElementById(nameId).textContent = name.length > 26 ? name.slice(0, 24) + '…' : name;
        onLoad(e.target.result);
        if (previewGenerated) generatePreview();
      };
      reader.readAsDataURL(file);
    });
  }

  handleImageUpload('storyImgInput', 'storyImgPreview', 'storyImgLabel', 'storyImgName', 'storyImgIcon', (d) => { storyImgData = d; });
  handleImageUpload('sponsorLogoInput', 'sponsorLogoPreview', 'sponsorLogoLabel', 'sponsorLogoName', 'sponsorLogoIcon', (d) => { sponsorLogoData = d; });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function clearErrors() {
    ['fTitle','fHeadline','fCta','fSponsor'].forEach(id => {
      document.getElementById(id).classList.remove('field-error');
      const msg = document.getElementById(id).nextElementSibling;
      if (msg && msg.classList.contains('error-msg')) msg.classList.remove('visible');
    });
    document.getElementById('storyImgZone').classList.remove('zone-error');
    document.getElementById('sponsorLogoZone').classList.remove('zone-error');
  }

  function setFieldError(id, msg) {
    const el = document.getElementById(id);
    el.classList.add('field-error');
    const msgEl = el.nextElementSibling;
    if (msgEl && msgEl.classList.contains('error-msg')) {
      msgEl.textContent = msg;
      msgEl.classList.add('visible');
    }
  }

  function generatePreview() {
    const title    = document.getElementById('fTitle').value.trim();
    const headline = document.getElementById('fHeadline').value.trim();
    const cta      = document.getElementById('fCta').value.trim();
    const sponsor  = document.getElementById('fSponsor').value.trim();

    clearErrors();
    let hasError = false;

    if (!storyImgData) {
      document.getElementById('storyImgZone').classList.add('zone-error');
      hasError = true;
    }
    if (!sponsorLogoData) {
      document.getElementById('sponsorLogoZone').classList.add('zone-error');
      hasError = true;
    }
    if (!title)    { setFieldError('fTitle',    'Story title is required'); hasError = true; }
    if (!headline) { setFieldError('fHeadline', 'Headline is required');    hasError = true; }
    if (!cta)      { setFieldError('fCta',      'CTA text is required');    hasError = true; }
    if (!sponsor)  { setFieldError('fSponsor',  'Sponsor text is required'); hasError = true; }

    if (hasError) return;

    const preview = document.getElementById('livePreview');
    preview.innerHTML = `
      <div class="promo-flex">
        <div class="promo-picture">
          ${storyImgData
            ? `<img src="${storyImgData}" alt="Story image" />`
            : `<div class="no-img"><span style="font-size:28px;opacity:0.3">🖼</span><span>Upload a story image</span></div>`
          }
        </div>
        <div class="promo-copy">
          <div class="promo-title">${escHtml(title)}</div>
          <p class="promo-headline" role="paragraph">${escHtml(headline)}</p>
          <div class="promo-cta">${escHtml(cta)}</div>
          <div class="promo-sponsor">
            <span>${escHtml(sponsor)}</span>
            ${sponsorLogoData ? `<img src="${sponsorLogoData}" alt="Sponsor logo" />` : ''}
          </div>
        </div>
      </div>
    `;

    previewGenerated = true;
    document.getElementById('previewSize').textContent = '1200 × 408px';
  }


  // Live update on text change
  ['fTitle','fHeadline','fCta','fSponsor'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById(id).classList.remove('field-error');
      const msg = document.getElementById(id).nextElementSibling;
      if (msg && msg.classList.contains('error-msg')) msg.classList.remove('visible');
      if (previewGenerated) generatePreview();
    });
  });
</script>
</body>
</html>
